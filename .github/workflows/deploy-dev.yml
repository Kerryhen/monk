name: Deploy Dev

on:
  push:
    branches: [development]

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install PDM
        run: pip install pdm

      - name: Install dependencies
        working-directory: services/api
        run: pdm install --dev

      - name: Run tests
        working-directory: services/api
        run: doppler run -- pdm run task test
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STG }}

      - name: Generate coverage badge
        uses: tj-actions/coverage-badge-py@v2
        with:
          coverage-xml-file: services/api/coverage.xml
          output: badges/coverage.svg

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          push: true
          tags: ghcr.io/${{ env.OWNER }}/monk-api:dev

      - name: Redeploy Dockploy dev environment
        run: doppler run -- sh -c 'curl -s -X GET "$DOCKPLOY_WEBHOOK"'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STG }}
