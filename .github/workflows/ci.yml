name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install PDM
        run: pip install pdm

      - name: Install dependencies
        working-directory: services/api
        run: pdm install --dev

      - name: Lint
        working-directory: services/api
        run: pdm run task lint

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install PDM
        run: pip install pdm

      - name: Install dependencies
        run: pdm install --dev

      - name: Run tests
        run: doppler run -- pdm run task test
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
