name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'monk-api-v*.*.*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install PDM
        run: pip install pdm

      - name: Install dependencies
        run: pdm install --dev

      - name: Run tests
        run: doppler run -- pdm run task test
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STG }}

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version and normalize owner
        id: ver
        run: |
          VERSION=$(grep '^version' services/api/pyproject.toml | sed 's/version = "//;s/"//')
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "owner=$OWNER" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          push: true
          tags: |
            ghcr.io/${{ steps.ver.outputs.owner }}/monk-api:v${{ steps.ver.outputs.version }}
            ghcr.io/${{ steps.ver.outputs.owner }}/monk-api:latest

      - name: Deploy to production (Dockploy)
        run: doppler run -- sh -c 'curl -s -X GET "$DOCKPLOY_WEBHOOK"'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
