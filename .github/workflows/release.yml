name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/monk-api:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/monk-api:latest

      - name: Deploy to production (Dockploy)
        run: curl -s -X GET "${{ secrets.DOCKPLOY_PROD_WEBHOOK }}"
